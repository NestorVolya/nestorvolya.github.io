<!doctype html>
<html lang="{{ site.lang | default: 'uk-UA' }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ page.description | default: site.description }}">
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="{{ '/' | relative_url }}">Nestor Volya</a>
      <nav class="nav" aria-label="Main navigation">
        {% for item in site.nav %}
          <a href="{{ item.url | relative_url }}">{{ item.title }}</a>
        {% endfor %}
      </nav>
    </header>
    <main class="page">
      {{ content }}
    </main>
    <footer class="site-footer">
      <span>OSINT analyst profile. Public version only.</span>
      <span>Raw sources and sensitive context are excluded from the published site.</span>
    </footer>
  </body>
</html>
